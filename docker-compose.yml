version: "3.9"

# Phase 5 will fully wire these services.
# For Phase 1, run backend and frontend independently (see README).

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: gst_user
      POSTGRES_PASSWORD: gst_password
      POSTGRES_DB: gst_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
